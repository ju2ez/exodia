# Exodia run configuration (non-secret tunables).
# Secrets (API keys) come from environment variables — see .env.example.

upstream:
  repo: "jennyzzt/awesome-open-ended"   # the curated source list (Jenny Zhang)
  branch: "main"

site:
  title: "Exodia"
  # base_url: leave "" for a user/org page served at the domain root.
  # Set to "/exodia" if this is a project page (served under /<repo>/).
  base_url: ""
  # owner/repo hosting the per-idea GitHub Issues (voting + feedback backend).
  # Leave "" to fall back to $GITHUB_REPOSITORY (set automatically in CI).
  repo: "ju2ez/exodia"

ideation:
  # Google Gemini via AI-Scientist-v2 (needs GEMINI_API_KEY; talks to Gemini's
  # OpenAI-compatible endpoint). exodia registers this id in AI-Scientist-v2's
  # model allowlist automatically, so any current id works (gemini-2.5-pro,
  # gemini-3-pro-preview, gemini-2.0-flash, or gpt-*/claude-* with their keys).
  model: "gemini-2.5-pro"
  max_num_generations: 3
  num_reflections: 4   # enough rounds to search + reflect + FinalizeIdea
  # Max seconds to allow the AI-Scientist-v2 subprocess to run before timing out.
  timeout_seconds: 3000

enrich:
  max_new_fetches: 250         # cover the whole list in one run (cache-first afterwards)
  request_delay_seconds: 3.0   # arXiv politeness: <= 1 request / 3 seconds

pdfs:
  fetch: true                  # also download full-text PDFs (kept locally, git-ignored)
  max_new_downloads: 250       # cover the whole list in one run (cache-first afterwards)
  request_delay_seconds: 3.0   # arXiv politeness between PDF downloads

citations:
  fetch: true                  # fetch citation counts (Semantic Scholar) for impact trends
  max_new_fetches: 500         # cover the whole list in one run
  request_delay_seconds: 1.0   # delay between Semantic Scholar batches (S2_API_KEY raises limits)

fulltext:
  analyze: true                # mine the downloaded PDFs' full text into the analysis corpus
  max_chars: 40000             # per-paper cap on extracted text (bounds noise + memory)

transcripts:
  fetch: true                  # fetch video (YouTube) transcripts into the analysis corpus
  max_new_fetches: 100         # cover all videos in one run
  request_delay_seconds: 1.0   # politeness delay between transcript fetches

analysis:
  method: "tfidf_kmeans"
  use_llm: false               # optional LLM consensus paragraph (AI-labeled on site)
  k_range: [3, 8]              # KMeans cluster-count search range

ideas:
  match_threshold: 0.13        # min idea<->new-paper cosine to mark an idea "realized" (★)
  novelty_threshold: 0.82      # drop a newly generated idea if this similar to an existing one

paths:
  data_dir: "data"
  site_dir: "site"

# The schedule itself is declared in .github/workflows/pipeline.yml.
# Documented here for reference:
schedule_cron: "17 6 * * *"   # daily 06:17 UTC poll of upstream
