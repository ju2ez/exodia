name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/**"
      - "site/**"
      - "*.md"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          uv venv --clear
          uv pip install -e ".[dev]"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest
